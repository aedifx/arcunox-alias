<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID Generator</title>
    <meta name="description" content="Minimal, privacy-first UUID v4 generator. No tracking. No analytics. No dependencies.">
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            padding: 2rem;
            font-family: system-ui, sans-serif;
            background: #050608;
            color: #f5f5f5;
            line-height: 1.6;
        }
        main {
            max-width: 880px;
            margin: auto;
            display: grid;
            gap: 1.5rem;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 0.04em;
        }
        p { color: #b3b3b3; }

        .panel {
            border: 1px solid #262833;
            background: radial-gradient(circle at top left, #151824 0, #050608 55%);
            padding: 1.25rem 1.5rem;
        }

        .uuid {
            font-family: ui-monospace, monospace;
            font-size: 1.4rem;
            padding: 1rem 0;
            word-break: break-all;
            color: #f5f5f5;
        }

        button {
            padding: 0.55rem 1.1rem;
            font-size: 0.9rem;
            border: 1px solid #f5f5f5;
            background: transparent;
            color: #f5f5f5;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        button:hover {
            background: #f5f5f5;
            color: #050608;
        }

        footer {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #5f6475;
        }
    </style>
</head>

<body>
    <main>
        <section>
            <h1>UUID Generator</h1>
            <p>Generate a UUID v4 locally in your browser. No tracking, no analytics, no external requests.</p>
        </section>

        <section class="panel">
            <div class="uuid" id="uuid">Loading…</div>
            <button id="regen">Generate New UUID</button>
        </section>

        <footer>No tracking. No analytics. No cookies. No logs.</footer>
    </main>

    <script>
        function generateUUID() {
            return crypto.randomUUID();
        }

        function update() {
            document.getElementById('uuid').textContent = generateUUID();
        }

        document.getElementById('regen').onclick = update;

        update();
    </script>
</body>
</html>
