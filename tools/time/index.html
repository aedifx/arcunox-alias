<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unix Timestamp Converter</title>
    <meta name="description" content="Minimal, privacy-first Unix timestamp converter. No tracking. No analytics. No dependencies.">
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            padding: 2rem;
            font-family: system-ui, sans-serif;
            background: #050608;
            color: #f5f5f5;
            line-height: 1.6;
        }
        main {
            max-width: 880px;
            margin: auto;
            display: grid;
            gap: 1.5rem;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 0.04em;
        }
        p { color: #b3b3b3; max-width: 60ch; }

        .panel {
            border: 1px solid #262833;
            background: radial-gradient(circle at top left, #151824 0, #050608 55%);
            padding: 1.25rem 1.5rem;
        }

        .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #8b8fa0;
            margin-bottom: 0.5rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.75rem;
            box-sizing: border-box;
            border: 1px solid #303344;
            background: #05060a;
            color: #f5f5f5;
            font-family: ui-monospace, monospace;
            font-size: 0.9rem;
        }
        input:focus, textarea:focus {
            outline: 1px solid #4f7dff;
            border-color: #4f7dff;
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        button {
            padding: 0.55rem 1.1rem;
            font-size: 0.9rem;
            border: 1px solid #f5f5f5;
            background: transparent;
            color: #f5f5f5;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        button:hover {
            background: #f5f5f5;
            color: #050608;
        }

        footer {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #5f6475;
        }
    </style>
</head>

<body>
    <main>
        <section>
            <h1>Unix Timestamp Converter</h1>
            <p>Convert between Unix timestamps and human-readable dates. All processing happens locally — no tracking, no analytics, no logs.</p>
        </section>

        <section class="panel">
            <div class="label">Unix → Human</div>
            <input id="unixInput" placeholder="Enter Unix timestamp (seconds or milliseconds)">
            <div class="controls">
                <button id="unixConvert">Convert</button>
                <button id="unixClear">Clear</button>
            </div>
            <textarea id="unixOutput" readonly placeholder="Result will appear here."></textarea>
        </section>

        <section class="panel">
            <div class="label">Human → Unix</div>
            <input id="dateInput" placeholder="Enter date (YYYY-MM-DD HH:MM:SS)">
            <div class="controls">
                <button id="dateConvert">Convert</button>
                <button id="dateClear">Clear</button>
            </div>
            <textarea id="dateOutput" readonly placeholder="Result will appear here."></textarea>
        </section>

        <footer>No tracking. No analytics. No cookies. No logs.</footer>
    </main>

    <script>
        function formatDate(d) {
            return d.toLocaleString(undefined, {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        document.getElementById('unixConvert').onclick = () => {
            const raw = document.getElementById('unixInput').value.trim();
            const out = document.getElementById('unixOutput');

            if (!raw) return out.value = '';

            let ts = Number(raw);
            if (raw.length > 10) ts = ts / 1000;

            const date = new Date(ts * 1000);
            if (isNaN(date.getTime())) {
                out.value = 'Invalid timestamp.';
                return;
            }

            out.value = formatDate(date) + '\n\nISO: ' + date.toISOString();
        };

        document.getElementById('unixClear').onclick = () => {
            document.getElementById('unixInput').value = '';
            document.getElementById('unixOutput').value = '';
        };

        document.getElementById('dateConvert').onclick = () => {
            const raw = document.getElementById('dateInput').value.trim();
            const out = document.getElementById('dateOutput');

            if (!raw) return out.value = '';

            const date = new Date(raw);
            if (isNaN(date.getTime())) {
                out.value = 'Invalid date format.';
                return;
            }

            out.value =
                'Unix (seconds): ' + Math.floor(date.getTime() / 1000) +
                '\nUnix (ms): ' + date.getTime() +
                '\nISO: ' + date.toISOString();
        };

        document.getElementById('dateClear').onclick = () => {
            document.getElementById('dateInput').value = '';
            document.getElementById('dateOutput').value = '';
        };
    </script>
</body>
</html>
