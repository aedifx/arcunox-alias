<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="data:,">
  <title>arcunox / username generator</title>

  <style>
html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #050609;
  color: #f5f5f5;
  font-family: system-ui, -apple-system, BlinkMacSystemFont,
               "SF Pro Text", "Segoe UI", sans-serif;
  box-sizing: border-box;
}

*, *::before, *::after {
  box-sizing: inherit;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 40px;
  margin: 0;
}

#app {
  width: 1080px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.titlebar {
  width: 100%;
  padding: 14px 0;
  text-align: center;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 13px;
  color: #888;
  border-bottom: 1px solid #222;
  margin-bottom: 40px;
}

.plate {
  width: 500px;
  padding: 32px;
  background: #0b0c10;
  border: 1px solid #222;
}

.wrap {
  width: 100%;
}

.title {
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: 14px;
  color: #888;
  margin-bottom: 18px;
}

.row {
  margin-bottom: 16px;
}

label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #777;
  margin-bottom: 6px;
}

input[type="text"] {
  width: 100%;
  padding: 8px 10px;
  background: #121318;
  border: 1px solid #333;
  color: #f5f5f5;
  font-size: 13px;
  outline: none;
}

input[type="text"]:focus {
  border-color: #f5f5f5;
}

input::placeholder {
  font-style: italic;
  color: #555;
}

.btn-generate {
  width: 100%;
  border: 1px solid #f5f5f5;
  background: #f5f5f5;
  color: #050609;
  padding: 9px 10px;
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  cursor: pointer;
  margin-bottom: 16px;
}

.btn-generate:active {
  background: #ddd;
}

.output {
  font-family: "SF Mono", ui-monospace, Menlo, Monaco, Consolas,
               "Liberation Mono", monospace;
  font-size: 13px;
  padding: 10px;
  background: #0b0c10;
  border: 1px solid #333;
  min-height: 38px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  word-break: break-all;
}

.output span {
  flex: 1;
}

.copy-btn {
  border: 1px solid #333;
  background: transparent;
  color: #aaa;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 4px 6px;
  cursor: pointer;
  white-space: nowrap;
  min-width: 60px;
  text-align: center;
}

.footnote {
  margin-top: 16px;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #555;
}

.donate {
  margin-top: 20px;
}

.donate a {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-decoration: none;
  text-transform: uppercase;
  color: #555;
}

.donate a:hover {
  color: #888;
}

  </style>
</head>

<body>
<div id="app">

  <div class="titlebar">Arcunox / Username Generator</div>

  <div class="plate">
    <div class="wrap">

      <div class="title">Username</div>

      <div class="row">
        <label for="seed">Seed</label>
        <input id="seed" type="text" placeholder="optional" autocomplete="off" spellcheck="false">
      </div>

      <button class="btn-generate" id="generateBtn">Generate</button>

      <div class="output">
        <span id="aliasOutput"></span>
        <button class="copy-btn" id="copyBtn">Copy</button>
      </div>

    </div>
  </div>

  <div class="footnote">No logs. No analytics. All client‑side.</div>
  
  <div class="donate">
   <a href="https://donate.arcunox.com" target="_blank" rel="noopener noreferrer">donate</a>
  </div>

</div>

<script type="module">
  import { WORDS } from "./vocab.js";

  function cryptoInt(max) {
    const buf = new Uint32Array(1);
    crypto.getRandomValues(buf);
    return buf[0] % max;
  }

  function pick(arr) {
    return arr[cryptoInt(arr.length)];
  }

  function sanitize(str) {
    return str
      .toLowerCase()
      .normalize("NFKD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9]/g, "");
  }

  const seedInput   = document.getElementById("seed");
  const generateBtn = document.getElementById("generateBtn");
  const aliasOutput = document.getElementById("aliasOutput");
  const copyBtn     = document.getElementById("copyBtn");

  function generateUsername() {
    let seed = sanitize(seedInput.value.trim());
    const w1 = pick(WORDS);
    const w2 = pick(WORDS.filter(w => w !== w1));
    const num = String(cryptoInt(9999)).padStart(2, "0");

    const SEPS = ["", "_", "-"];
    const sep = SEPS[cryptoInt(SEPS.length)];

    const patternsNoSeed = [
      () => w1 + sep + num,
      () => w1 + sep + w2,
      () => w1 + w2,
      () => w1 + num
    ];

    const patternsWithSeed = [
      () => seed + sep + num,
      () => w1 + sep + seed,
      () => seed + num,
      () => w1 + seed
    ];

    let out;

    if (seed) {
      out = patternsWithSeed[cryptoInt(patternsWithSeed.length)]();
    } else {
      out = patternsNoSeed[cryptoInt(patternsNoSeed.length)]();
    }

    if (out.length < 8) out += String(cryptoInt(99)).padStart(2, "0");
    if (out.length > 18) out = out.slice(0, 18);

    aliasOutput.textContent = out;
    return out;
  }

  generateBtn.addEventListener("click", generateUsername);

  copyBtn.addEventListener("click", async () => {
    const val = aliasOutput.textContent.trim();
    if (!val) return;

    try {
      await navigator.clipboard.writeText(val);
      const original = copyBtn.textContent;
      copyBtn.textContent = "Copied";
      setTimeout(() => (copyBtn.textContent = original), 900);
    } catch (e) {}
  });

  generateUsername();
</script>
</body>
</html>
