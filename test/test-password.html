<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="data:,">
  <title>arcunox / password generator</title>

  <style>
html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #050609;
  color: #f5f5f5;
  font-family: system-ui, -apple-system, BlinkMacSystemFont,
               "SF Pro Text", "Segoe UI", sans-serif;
  box-sizing: border-box;
}

*, *::before, *::after {
  box-sizing: inherit;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 40px;
  margin: 0;
}

#app {
  width: 1080px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.titlebar {
  width: 100%;
  padding: 14px 0;
  text-align: center;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 13px;
  color: #888;
  border-bottom: 1px solid #222;
  margin-bottom: 40px;
}

.plate {
  width: 500px;
  padding: 32px;
  background: #0b0c10;
  border: 1px solid #222;
}

.wrap {
  width: 100%;
}

.title {
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: 14px;
  color: #888;
  margin-bottom: 18px;
}

.btn-generate {
  width: 100%;
  border: 1px solid #f5f5f5;
  background: #f5f5f5;
  color: #050609;
  padding: 9px 10px;
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  cursor: pointer;
  margin-bottom: 16px;
}

.btn-generate:active {
  background: #ddd;
}

.output {
  font-family: "SF Mono", ui-monospace, Menlo, Monaco, Consolas,
               "Liberation Mono", monospace;
  font-size: 13px;
  padding: 10px;
  background: #0b0c10;
  border: 1px solid #333;
  min-height: 38px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  word-break: break-all;
}

.output span {
  flex: 1;
}

.copy-btn {
  border: 1px solid #333;
  background: transparent;
  color: #aaa;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 4px 6px;
  cursor: pointer;
  white-space: nowrap;
  min-width: 60px;
  text-align: center;
}

.footnote {
  margin-top: 16px;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-align: center;
  text-transform: uppercase;
  color: #555;
}

.donate {
  margin-top: 20px;
}

.donate a {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-decoration: none;
  text-transform: uppercase;
  color: #555;
}

.donate a:hover {
  color: #888;
}
  </style>
</head>

<body>
<div id="app">

  <div class="titlebar">Arcunox / Password Generator</div>

<div class="plate">
  <div class="wrap">

    <div class="title">Password</div>

    <button class="btn-generate" id="strongBtn">Strong</button>
    <button class="btn-generate" id="readableBtn">Readable</button>

    <div class="output">
      <span id="pwOutput"></span>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>

  </div>
</div>

<div class="footnote">
  <div>Generated locally. No storage. No tracking.</div>
  <div>No logs. No analytics. All client‑side.</div>
</div>
 
  <div class="donate">
   <a href="https://donate.arcunox.com" target="_blank" rel="noopener noreferrer">donate</a>
  </div>

</div>

<script type="module">
  const strongBtn   = document.getElementById("strongBtn");
  const readableBtn = document.getElementById("readableBtn");
  const pwOutput    = document.getElementById("pwOutput");
  const copyBtn     = document.getElementById("copyBtn");

  let clearTimer = null;

  function clearPasswordLater() {
    if (clearTimer) {
      clearTimeout(clearTimer);
    }

    clearTimer = setTimeout(() => {
      pwOutput.textContent = "Password cleared from screen. Clipboard may still contain it.";
      clearTimer = null;
    }, 45000); // 45 seconds
  }

  function getRandomBytes(len) {
    const arr = new Uint8Array(len);
    crypto.getRandomValues(arr);
    return arr;
  }

  function generateStrongPassword() {
    const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()-_=+[]{};:,.<>?";
    const bytes = getRandomBytes(32);
    let out = "";

    for (let i = 0; i < bytes.length; i++) {
      out += charset[bytes[i] % charset.length];
    }

    pwOutput.textContent = out;
    clearPasswordLater();
  }

  function generateReadablePassword() {
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
    const digits  = "0123456789";

    function randomChar(set) {
      const bytes = getRandomBytes(1);
      return set[bytes[0] % set.length];
    }

    function randomSegment(len) {
      let s = "";
      for (let i = 0; i < len; i++) {
        // 0–2: letter, 3: digit (roughly 1 in 4 chars digit)
        const bytes = getRandomBytes(1);
        if (bytes[0] % 4 === 3) {
          s += randomChar(digits);
        } else {
          s += randomChar(letters);
        }
      }
      return s;
    }

    const segmentCount = 4 + (getRandomBytes(1)[0] % 2); // 4 or 5 segments
    const segments = [];

    for (let i = 0; i < segmentCount; i++) {
      const len = 4 + (getRandomBytes(1)[0] % 3); // 4–6 chars
      segments.push(randomSegment(len));
    }

    const out = segments.join("-");
    pwOutput.textContent = out;
    clearPasswordLater();
  }

  strongBtn.addEventListener("click", generateStrongPassword);
  readableBtn.addEventListener("click", generateReadablePassword);

  copyBtn.addEventListener("click", async () => {
    const pw = pwOutput.textContent.trim();
    if (!pw || pw.startsWith("Password cleared")) return;

    try {
      await navigator.clipboard.writeText(pw);
      const original = copyBtn.textContent;
      copyBtn.textContent = "Copied";
      setTimeout(() => (copyBtn.textContent = original), 900);
    } catch (e) {
      // silently ignore
    }
  });
</script>
</body>
</html>
